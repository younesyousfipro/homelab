- name: Install K3s worker nodes
  hosts: k3s_workers
  become: true

  vars:
    k3s_server_host: cp
    k3s_server_url: "https://{{ hostvars[k3s_server_host].ansible_host }}:6443"
  tasks:
    - name: Install K3s agent
      shell: > 
        curl -sfL https://get.k3s.io | 
        K3S_URL={{ k3s_server_url }} K3S_TOKEN={{ hostvars['cp'].k3s_token.stdout }} 
        sh -
      args:
        creates: /usr/local/bin/k3s-agent

    - name: Ensure K3s agent service is running
      systemd:
        name: k3s-agent
        state: started
        enabled: true
